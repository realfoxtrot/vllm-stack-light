services:
  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >        
      --model google/gemma-3-27b-it
      --quantization fp8
      --max-model-len 32768
      --gpu-memory-utilization 0.92
      --host 0.0.0.0
      --port 8000
    volumes:
      - vllm_cache:/root/.cache/huggingface
    environment:  
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}   
    ports:
      - "127.0.0.1:8000:8000" # Only accessible from this server
    shm_size: "16g"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false # Required for HTTP access on local network
      - GENERIC_TIMEZONE=UTC
      - N8N_HOST=0.0.0.0
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - vllm
    restart: unless-stopped

volumes:
  vllm_cache:
  n8n_data: